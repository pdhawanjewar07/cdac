<html>

<body>
    <div style="border-style: dashed;padding-left: 100px ; width: 300px;">
        <input type="color" id="c1" />
        <button onclick="change()">Change Color</button>
    </div>

    <div id="d1" style="width: 100px;height: 100; background-color: aqua;">
    </div>



</body>

<script type="text/javascript">

    function change() {

        let color = document.getElementById("c1").value;
        // alert(color);
        document.getElementById("d1").
            style.backgroundColor = color;
        document.getElementById("d1").
            style.height = 200;


    }

</script>


</html>
