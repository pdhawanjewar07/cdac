<!DOCTYPE html>
<html>
<body>
    
    <strong>HTML Legend Tag</strong>
    <form>
        <fieldset>
            <!-- Legend tag using -->
            <legend>STUDENT::</legend>
            <label>Name:</label>
            <input type="text">
            <br><br>
            <label>Email:</label>
            <input type="text">
            <br><br>
            <label>Date of birth:</label>
            <input type="text">
            <br><br>
            <label>Address:</label>
            <input type="text">
            <br><br>
            <label>Enroll No:</label>
            <input type="text">
			
			<fieldset>
			<legend>Occupation</legend>
				<label for="student">
            Student
        </label>
        <input type="radio" 
               name="Occupation" 
               id="student" 
               value="student">

        <label for="business">
            Business
        </label>
        <input type="radio" 
               name="Occupation" 
               id="business" 
               value="business">

        </fieldset>
			
			
			
			
        </fieldset>
    </form>
</body>

</html>
