<html>
  <head>
    <title>ChangePassword.html</title>
  </head>
  <body>
    <form action="index.html">
      <label for="UserName">Enter UserName: </label>
      <input type="text" id="UserName" name="user" minlength="5" maxlength="10" required/>
      <br /><br />

      <label for="new_password"> Enter New Password: </label>
      <input id="new_password" type="password" name="pass" minlength="5" maxlength="10" required/>
      <br /><br />

      <label for="re_enter_new_password"> Re-Enter New Password: </label>
      <input id="re_enter_new_password" type="password" name="pass" minlength="5" maxlength="10" required/>
      <br /><br />

      <button id="Update_Password" type="submit">Update Password</button>
    </form>
  </body>
</html>
