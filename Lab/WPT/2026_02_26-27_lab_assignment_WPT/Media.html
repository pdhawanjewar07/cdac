<!doctype html>
<html lang="en">
  <head>
    <title>media.html</title>
  </head>
  <body>
    <fieldset id="video">
        <legend>A youtube video in i-frame</legend>
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/a3ICNMQW7Ok?si=DFV9aw6Jo8cf4ICW"
        title="YouTube video player"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </fieldset>

    <fieldset id="audio">
        <legend>An audio file with controls</legend>

        <figure>
            <figcaption>Listen to: sample music:</figcaption>
        </figure>
        <audio controls src="assets/sample.mp3"></audio>
    </fieldset>
  </body>
</html>
