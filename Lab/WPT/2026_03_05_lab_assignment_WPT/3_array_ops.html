<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Operations</title>
</head>
<body>
    
    <fieldset>
        <legend>Array at present</legend>
        <div id="output_arr"></div>
        <br>
        <!-- <button id="update_arr_display">Update Array(latest)</button> -->
    </fieldset>
    

    <br><br>
    <input id="input_text" type="text" placeholder="Enter some text">

    <button id="add_to_array">Append(at end) in Array</button>
    <button id="check_found">Check Presence in Array</button>

    <br><br>
    <input id="add_at_index" type="number" placeholder="Add at index">
    <button id="add_to_array_at_index">Append(at index) in Array</button>

    <br><br>
    <input id="remove_at_index" type="number" placeholder="Remove at index">
    <button id="remove_from_array_at_index">Remove(at index) in Array</button>


    

    <script src="3.js"></script>
</body>
</html>
