<html>
  <head>
    <title>Login.html</title>
  </head>
  <body>
    <fieldset>
      <legend>Login Field</legend>
      <form action="index.html">
        <label for="UserName">Enter UserName: </label>

        <input type="text" id="UserName" name="user" minlength="5" maxlength="10" required/>

        <label for="password"> Enter Password: </label>
        <input id="password" type="password" name="pass" minlength="5" maxlength="10" required />
        <br><br>

        <button type="submit">Login</button>
      </form>
    </fieldset>
  </body>
</html>
