<html>
  <head>
    <title>AboutUs.html</title>
  </head>
  <body>
    <label for="resume"><h2>Resume</h2></label>
    <div id="resume">
      <fieldset id="education">
        <legend>Education Details</legend>

        <table border="1">
          <thead>
            <tr>
              <th>Course</th>
              <th>Duration</th>
              <th>Result</th>
            </tr>
          </thead>
          <tr>
            <td>Course 1</td>
            <td>Duration 1</td>
            <td>Result 1</td>
          </tr>
          <tr>
            <td>Course 2</td>
            <td>Duration 2</td>
            <td>Result 2</td>
          </tr>
          <tr>
            <td>Course 3</td>
            <td>Duration 3</td>
            <td>Result 3</td>
          </tr>
        </table>
      </fieldset>

      <fieldset id="hobbies">
        <legend>Hobbies</legend>
        <ul>
          <li>Hobby 1</li>
          <li>Hobby 2</li>
          <li>Hobby 3</li>
        </ul>
      </fieldset>

      <fieldset>
        <legend>Project Description</legend>

        <div id="project_description">
        <dl>
          <dt>Project 1</dt>
          <dd>Description 1</dd>

          <dt>Project 2</dt>
          <dd>Description 2</dd>

          <dt>Project 3</dt>
          <dd>Description 3</dd>
        </dl>
      </div>
      </fieldset>
      
    </div>

    <fieldset id="upload_resume">
      <legend>Upload Resume</legend>

      
      <input type="file" id="upload_resume">

    </fieldset>
  </body>
</html>
